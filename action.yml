name: ZKsync Server Action (L1 + L2)
description: Starts Anvil (L1) and ZKsync OS server (L2) for L1-L2 testing
author: dutterbutter
branding:
  icon: server
  color: blue
inputs:
  version:
    description: Release tag (e.g. v0.8.2) or 'latest'
    default: latest
  include_prerelease:
    description: Allow pre-releases when version is 'latest'
    default: 'false'
  l1_port:
    description: L1 (Anvil) RPC port
    default: '8545'
  l2_port:
    description: L2 (ZKsync OS) RPC port (single_chain only)
    default: '3050'
  linux_arch:
    description: Linux arch (x86_64 or aarch64)
    default: x86_64
  protocol_version:
    description: Protocol version inside local-chains (e.g. v31.0)
    default: v31.0
  setup:
    description: 'Setup type: ''single_chain'' or ''multi_chain'''
    default: 'single_chain'
  l2_ports:
    description: |
      Chain ID to RPC port map for multi_chain setup (one entry per line, format: "<chain_id>: <port>").
    default: |
      6565: 3050
      6566: 3051
  set_env:
    description: 'If ''true'', export ETH_RPC and ZKSYNC_RPC to GITHUB_ENV'
    default: 'true'
  boot_grace_seconds:
    description: Seconds to wait after starting each server before moving on
    default: '3'
  anvil_logs:
    description: 'If ''true'', print Anvil log at the end'
    default: 'false'
  zksync_logs:
    description: 'If ''true'', print zksync-os-server log at the end'
    default: 'false'
  config_yaml:
    description: Optional YAML config for zksync-os-server (overrides defaults, single_chain only).
    required: false
  operator_commit_sk:
    description: Override l1_sender.operator_commit_sk (single_chain only)
    required: false
  operator_prove_sk:
    description: Override l1_sender.operator_prove_sk (single_chain only)
    required: false
  operator_execute_sk:
    description: Override l1_sender.operator_execute_sk (single_chain only)
    required: false
outputs:
  l1_rpc_url:
    description: Resolved L1 RPC URL
    value: '${{ steps.vars.outputs.l1 }}'
  l2_rpc_url:
    description: Resolved L2 RPC URL (single_chain; first chain port in multi_chain)
    value: '${{ steps.vars.outputs.l2 }}'
  resolved_version:
    description: Resolved tag actually used
    value: '${{ steps.resolve.outputs.tag }}'
  anvil_log_path:
    description: Path to the Anvil log file
    value: '${{ steps.vars.outputs.anvil_log }}'
  zksync_log_path:
    description: Path to the zksync-os-server log file (single_chain only)
    value: '${{ steps.vars.outputs.zksync_log }}'
runs:
  using: composite
  steps:
    - id: vars
      shell: bash
      run: |
        echo "l1=http://127.0.0.1:${{ inputs.l1_port }}" >> "$GITHUB_OUTPUT"
        echo "anvil_log=.zks/anvil.log" >> "$GITHUB_OUTPUT"
        echo "zksync_log=.zks/zksyncos.log" >> "$GITHUB_OUTPUT"
        if [[ "${{ inputs.setup }}" == "multi_chain" ]]; then
          first_url=""
          while IFS=: read -r chain_id port _rest; do
            chain_id="${chain_id//[[:space:]]/}"
            port="${port//[[:space:]]/}"
            [[ -z "$chain_id" || "$chain_id" == \#* ]] && continue
            echo "l2_${chain_id}=http://127.0.0.1:${port}" >> "$GITHUB_OUTPUT"
            [[ -z "$first_url" ]] && first_url="http://127.0.0.1:${port}"
          done <<< "${{ inputs.l2_ports }}"
          echo "l2=${first_url}" >> "$GITHUB_OUTPUT"
        else
          echo "l2=http://127.0.0.1:${{ inputs.l2_port }}" >> "$GITHUB_OUTPUT"
        fi
    - id: resolve
      uses: actions/github-script@v7
      with:
        github-token: '${{ github.token }}'
        script: >
          const owner = 'matter-labs';

          const repo  = 'zksync-os-server';


          const version = core.getInput('version')?.trim() || 'latest';

          const includePre = (core.getInput('include_prerelease') ||
          'false').toLowerCase() === 'true';


          let tag = version;


          async function latestStable() {
            const res = await github.rest.repos.getLatestRelease({ owner, repo });
            return res.data.tag_name;
          }


          async function latestIncludingPrerelease() {
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner, repo, per_page: 20,
            });
            const rel = releases.find(r => !r.draft);
            if (!rel) throw new Error(`No releases found for ${owner}/${repo}`);
            return rel.tag_name;
          }


          if (version === 'latest') {
            tag = includePre ? await latestIncludingPrerelease() : await latestStable();
          }


          core.info(`Resolved zksync-os-server tag: ${tag}`);

          core.setOutput('tag', tag);

          core.setOutput('base',
          `https://github.com/${owner}/${repo}/releases/download/${tag}`);
    - name: Download release assets
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p .zks && cd .zks

        base="${{ steps.resolve.outputs.base }}"
        tag="${{ steps.resolve.outputs.tag }}"
        arch="${{ inputs.linux_arch }}"
        tgz="zksync-os-server-${tag}-${arch}-unknown-linux-gnu.tar.gz"
        local_chains_tgz="local-chains.tar.gz"

        curl -fL --retry 5 --retry-all-errors -o "$tgz" "$base/$tgz"

        tar -xzf "$tgz"
        chmod +x ./zksync-os-server

        if curl -fL --retry 5 --retry-all-errors -o "$local_chains_tgz" "$base/$local_chains_tgz"; then
          tar -xzf "$local_chains_tgz"

          protocol_dir="./local-chains/${{ inputs.protocol_version }}"
          if [[ ! -d "$protocol_dir" ]]; then
            echo "Protocol directory '$protocol_dir' was not found in local-chains.tar.gz"
            echo "Available protocol versions:"
            ls -1 ./local-chains || true
            exit 1
          fi
        else
          echo "local-chains.tar.gz not found for $tag; falling back to legacy state assets."
          curl -fL --retry 5 --retry-all-errors -O "$base/zkos-l1-state.json"
          curl -fL --retry 5 --retry-all-errors -O "$base/genesis.json"

          mkdir -p genesis
          mv genesis.json genesis/genesis.json
        fi
    - name: Start Anvil (L1)
      shell: bash
      run: |
        set -euo pipefail
        cd .zks

        if ! command -v anvil >/dev/null 2>&1; then
          echo "Anvil binary was not found in PATH."
          echo "Install Foundry before using this action (e.g. foundry-rs/foundry-toolchain@v1)."
          exit 1
        fi

        echo "Using anvil: $(command -v anvil)"
        anvil --version || true

        state_json="./zkos-l1-state.json"
        protocol_dir="./local-chains/${{ inputs.protocol_version }}"
        if [[ -d "$protocol_dir" ]]; then
          state_gz="$protocol_dir/l1-state.json.gz"

          if [[ ! -f "$state_gz" ]]; then
            alt_state_gz="$protocol_dir/l1.state.json.gz"
            if [[ -f "$alt_state_gz" ]]; then
              state_gz="$alt_state_gz"
            else
              echo "Missing L1 state archive. Expected one of:"
              echo "  $protocol_dir/l1-state.json.gz"
              echo "  $protocol_dir/l1.state.json.gz"
              exit 1
            fi
          fi

          gzip -dfk "$state_gz"
          state_json="${state_gz%.gz}"
        elif [[ ! -f "$state_json" ]]; then
          echo "Missing L1 state file. Expected either protocol state under local-chains or $state_json"
          exit 1
        fi

        STATE_PATH_ABS="$(realpath "$state_json")"
        echo "Starting anvil with --load-state $STATE_PATH_ABS"

        nohup anvil --load-state "$STATE_PATH_ABS" \
          --port ${{ inputs.l1_port }} \
          > anvil.log 2>&1 < /dev/null &

        echo $! > anvil.pid
        sleep "${{ inputs.boot_grace_seconds }}"

        PID="$(cat anvil.pid)"
        if ! kill -0 "$PID" 2>/dev/null; then
          echo "::group::anvil exited early"
          echo "PID $PID is not running."
          echo "Last 200 lines of anvil.log:"
          tail -n 200 anvil.log || true
          echo "::endgroup::"
          exit 1
        fi

    - id: config
      name: Resolve zksync-os-server config
      if: '${{ inputs.setup == ''single_chain'' }}'
      shell: bash
      run: |
        set -euo pipefail
        cd .zks

        PROTOCOL_CONFIG="$(pwd)/local-chains/${{ inputs.protocol_version }}/default/config.yaml"

        if [[ -n "${{ inputs.config_yaml }}" ]]; then
          CONFIG_PATH="$(pwd)/config.yaml"
          printf '%s\n' "${{ inputs.config_yaml }}" > "$CONFIG_PATH"
        else
          if [[ -f "$PROTOCOL_CONFIG" ]]; then
            CONFIG_PATH="$PROTOCOL_CONFIG"
          else
            CONFIG_PATH="$(pwd)/config.yaml"
            printf '%s\n' \
              'genesis:' \
              '  bridgehub_address: "0xb9247a375fffc63b3383c75024946fa9c3a8601f"' \
              '  bytecode_supplier_address: "0x194505775af2efaee14fcefe21ab0b271b61f35d"' \
              "  genesis_input_path: \"$(pwd)/genesis/genesis.json\"" \
              '  chain_id: 6565' \
              '' \
              'l1_sender:' \
              '  operator_commit_sk: "0xe9b7176c87e267fdfea1b47f2d340a98692a2d9a32811abc9983d6d46d8745e0"' \
              '  operator_prove_sk: "0x58a7d54878fe84e74c85e9a333de3abb46203be6d38b6f7a7d72494b5d871f2f"' \
              '  operator_execute_sk: "0x31f5aa09d23d41bad736cc6e2b4332cf76cdf40c256b5b7cd660a06940ea8629"' \
              '' \
              'external_price_api_client:' \
              '  source: "Forced"' \
              '  forced_prices:' \
              '    "0x0000000000000000000000000000000000000001": 3000' \
              > "$CONFIG_PATH"
          fi
        fi

        COMMIT_SK="${{ inputs.operator_commit_sk }}"
        PROVE_SK="${{ inputs.operator_prove_sk }}"
        EXECUTE_SK="${{ inputs.operator_execute_sk }}"

        if [[ -n "$COMMIT_SK" || -n "$PROVE_SK" || -n "$EXECUTE_SK" ]]; then
          OVERRIDE_CONFIG="$(pwd)/config.override.yaml"
          cp "$CONFIG_PATH" "$OVERRIDE_CONFIG"

          update_key() {
            local key="$1"
            local value="$2"

            if ! grep -Eq "^[[:space:]]*${key}:[[:space:]]*" "$OVERRIDE_CONFIG"; then
              echo "Could not find key '${key}' in $OVERRIDE_CONFIG"
              exit 1
            fi

            sed -E -i.bak "s|^([[:space:]]*${key}:[[:space:]]*).*$|\\1\"${value}\"|" "$OVERRIDE_CONFIG"
            rm -f "${OVERRIDE_CONFIG}.bak"
          }

          if [[ -n "$COMMIT_SK" ]]; then
            update_key "operator_commit_sk" "$COMMIT_SK"
          fi
          if [[ -n "$PROVE_SK" ]]; then
            update_key "operator_prove_sk" "$PROVE_SK"
          fi
          if [[ -n "$EXECUTE_SK" ]]; then
            update_key "operator_execute_sk" "$EXECUTE_SK"
          fi

          CONFIG_PATH="$OVERRIDE_CONFIG"
        fi

        test -s "$CONFIG_PATH"
        echo "path=$CONFIG_PATH" >> "$GITHUB_OUTPUT"

    - name: Start ZKsync OS server (L2)
      shell: bash
      run: |
        set -euo pipefail
        cd .zks

        export L1_RPC="http://127.0.0.1:${{ inputs.l1_port }}"
        export RUST_LOG=info
        export RUST_BACKTRACE=1

        if [[ "${{ inputs.setup }}" == "multi_chain" ]]; then
          MULTI_DIR="$(pwd)/local-chains/${{ inputs.protocol_version }}/multi_chain"
          if [[ ! -d "$MULTI_DIR" ]]; then
            echo "Multi-chain directory not found: $MULTI_DIR"
            exit 1
          fi

          declare -A PORT_MAP
          while IFS=: read -r chain_id port _rest; do
            chain_id="${chain_id//[[:space:]]/}"
            port="${port//[[:space:]]/}"
            [[ -z "$chain_id" || "$chain_id" == \#* ]] && continue
            PORT_MAP["$chain_id"]="$port"
          done <<< "${{ inputs.l2_ports }}"

          if [[ ${#PORT_MAP[@]} -eq 0 ]]; then
            echo "No entries found in l2_ports input"
            exit 1
          fi

          for chain_id in $(echo "${!PORT_MAP[@]}" | tr ' ' '\n' | sort); do
            config_file="$MULTI_DIR/chain_${chain_id}.yaml"

            if [[ ! -f "$config_file" ]]; then
              echo "Config file not found for chain $chain_id: $config_file"
              exit 1
            fi

            log_file="zksyncos_${chain_id}.log"
            echo "Starting chain $chain_id with config: $config_file"
            setsid bash -c "exec ./zksync-os-server --config \"$config_file\" </dev/null >>\"$log_file\" 2>&1" &
            echo $! > "l2_${chain_id}.pid"
            sleep "${{ inputs.boot_grace_seconds }}"
          done

          for chain_id in $(echo "${!PORT_MAP[@]}" | tr ' ' '\n' | sort); do
            PID="$(cat "l2_${chain_id}.pid")"
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "::group::chain $chain_id (PID $PID) exited early"
              tail -n 200 "zksyncos_${chain_id}.log" || true
              echo "::endgroup::"
              exit 1
            fi
            echo "Chain $chain_id launched (pid: $PID)."
          done

        else
          GENESIS_PATH="$(pwd)/local-chains/${{ inputs.protocol_version }}/genesis/genesis.json"
          if [[ ! -f "$GENESIS_PATH" ]]; then
            GENESIS_PATH="$(pwd)/genesis/genesis.json"
          fi
          export GENESIS="$GENESIS_PATH"
          export PORT="${{ inputs.l2_port }}"

          CONFIG_ABS="${{ steps.config.outputs.path }}"

          echo "Launching: ./zksync-os-server --config $CONFIG_ABS"
          setsid bash -c "exec ./zksync-os-server --config \"$CONFIG_ABS\" </dev/null >>zksyncos.log 2>&1" &
          echo $! > l2.pid

          sleep "${{ inputs.boot_grace_seconds }}"

          PID="$(cat l2.pid)"
          if ! kill -0 "$PID" 2>/dev/null; then
            echo "::group::zksync-os-server exited early"
            echo "PID $PID is not running."
            echo "Last 200 lines of zksyncos.log:"
            tail -n 200 zksyncos.log || true
            echo "::endgroup::"

            echo "::group::try foreground run to capture error"
            ./zksync-os-server --config "$CONFIG_ABS" || true
            echo "::endgroup::"

            exit 1
          fi

          echo "ZKsync OS launched (pid: $PID)."
        fi

    - name: Export RPC URLs
      if: '${{ inputs.set_env == ''true'' }}'
      shell: bash
      run: |
        echo "ETH_RPC=${{ steps.vars.outputs.l1 }}" >> "$GITHUB_ENV"
        if [[ "${{ inputs.setup }}" == "multi_chain" ]]; then
          while IFS=: read -r chain_id port _rest; do
            chain_id="${chain_id//[[:space:]]/}"
            port="${port//[[:space:]]/}"
            [[ -z "$chain_id" || "$chain_id" == \#* ]] && continue
            echo "ZKSYNC_RPC_${chain_id}=http://127.0.0.1:${port}" >> "$GITHUB_ENV"
          done <<< "${{ inputs.l2_ports }}"
        else
          echo "ZKSYNC_RPC=${{ steps.vars.outputs.l2 }}" >> "$GITHUB_ENV"
        fi
